    <style>
      :root {
        /* Palette from Design Doc */
        --night-base: #0d0d1a;
        --midnight-navy: #111827;
        --constellation-blue: #1e3a5f;
        --warm-gold: #f5c842;
        --rose-blush: #e8708a;
        --parchment: #faf3e0;
        --soft-white: #f9f9f9;
        --muted-gray: #8a8a9a;
        --success-glow: #4ade80;

        /* UI Variables */
        --bg-body: var(--night-base);
        --bg-sidebar: var(--midnight-navy);
        --text-main: var(--soft-white);
        --text-muted: var(--muted-gray);
        --border-color: rgba(255, 255, 255, 0.1);
        --accent: var(--rose-blush);
        --sidebar-width: 280px;
        --header-height: 60px;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji",
          "Segoe UI Symbol";
        background-color: var(--bg-body);
        color: var(--text-main);
        display: flex;
        height: 100vh;
        overflow: hidden;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }

      /* Sidebar */
      #sidebar {
        width: var(--sidebar-width);
        background-color: var(--bg-sidebar);
        border-right: 1px solid var(--border-color);
        display: flex;
        flex-direction: column;
        height: 100%;
        transition: transform 0.3s ease;
        z-index: 100;
      }

      .sidebar-header {
        padding: 20px 24px;
        border-bottom: 1px solid var(--border-color);
        display: flex;
        align-items: center;
        gap: 12px;
        justify-content: flex-start;
      }

      .logo {
        max-width: 36px;
        height: auto;
        filter: none;
      }

      .logo-text {
        font-size: 16px;
        font-weight: 600;
        color: var(--soft-white);
      }

      .nav-scroller {
        flex: 1;
        /* overflow-y: auto; */
        padding: 8px 0;
      }

      .nav-item {
        display: block;
        padding: 8px 24px;
        color: var(--text-muted);
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition:
          color 0.2s,
          background-color 0.2s;
        cursor: pointer;
        border-left: 2px solid transparent;
      }

      .nav-item:hover {
        color: var(--text-main);
        background-color: rgba(255, 255, 255, 0.03);
      }

      .nav-item.active {
        color: var(--accent);
        background-color: rgba(232, 112, 138, 0.1);
        border-left-color: var(--accent);
      }

      .divider {
        height: 1px;
        background-color: var(--border-color);
        margin: 8px 24px;
      }

      /* Accordion */
      .accordion-header {
        padding: 8px 24px;
        cursor: pointer;
        display: flex;
        justify-content: space-between;
        align-items: center;
        color: var(--text-main);
        font-weight: 600;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        opacity: 0.8;
        transition: opacity 0.2s;
      }

      .accordion-header:hover {
        opacity: 1;
      }

      .accordion-icon {
        width: 10px;
        height: 10px;
        border-right: 2px solid var(--text-muted);
        border-bottom: 2px solid var(--text-muted);
        transform: rotate(45deg);
        transition: transform 0.3s ease;
      }

      .accordion.open .accordion-icon {
        transform: rotate(-135deg);
      }

      .accordion-content {
        max-height: 0;
        overflow: hidden;
        transition: max-height 0.3s ease-out;
        background-color: rgba(0, 0, 0, 0.2);
      }

      .accordion.open .accordion-content {
        max-height: 1000px; /* Arbitrary large height */
        transition: max-height 0.5s ease-in;
      }

      .sub-nav-item {
        padding: 8px 24px 8px 40px;
        font-size: 13px;
        color: var(--text-muted);
        display: block;
        text-decoration: none;
        border-left: 2px solid transparent;
      }

      .sub-nav-item:hover {
        color: var(--text-main);
      }

      .sub-nav-item.active {
        color: var(--accent);
        border-left-color: var(--accent);
      }

      /* Main Content */
      #main {
        flex: 1;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
        background-color: var(--bg-body);
      }

      #mobile-header {
        display: none;
        padding: 16px;
        border-bottom: 1px solid var(--border-color);
        background-color: var(--bg-sidebar);
        align-items: center;
        justify-content: space-between;
      }

      .hamburger {
        background: none;
        border: none;
        color: var(--text-main);
        font-size: 24px;
        cursor: pointer;
      }

      #content-area {
        flex: 1;
        overflow-y: auto;
        padding: 40px 60px;
        max-width: 960px;
        margin: 0 auto;
        width: 100%;
      }

      /* Markdown Styles */
      .markdown-body {
        color: var(--text-main);
        font-size: 16px;
        line-height: 1.7;
      }

      .markdown-body h1,
      .markdown-body h2,
      .markdown-body h3,
      .markdown-body h4 {
        color: var(--text-main);
        margin-top: 1.5em;
        margin-bottom: 0.5em;
        font-weight: 600;
        letter-spacing: -0.02em;
      }

      .markdown-body h1 {
        font-size: 2.2em;
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border-color);
      }
      .markdown-body h2 {
        font-size: 1.7em;
        padding-bottom: 0.3em;
        border-bottom: 1px solid var(--border-color);
      }
      .markdown-body h3 {
        font-size: 1.4em;
      }

      .markdown-body p {
        margin-bottom: 1.2em;
      }

      .markdown-body a {
        color: var(--accent);
        text-decoration: none;
      }
      .markdown-body a:hover {
        text-decoration: underline;
      }

      .markdown-body code {
        font-family:
          "SF Mono", Monaco, Consolas, "Liberation Mono", "Courier New",
          monospace;
        background-color: rgba(255, 255, 255, 0.1);
        padding: 0.2em 0.4em;
        border-radius: 4px;
        font-size: 85%;
      }

      .markdown-body pre {
        background-color: #1e1e1e;
        padding: 16px;
        border-radius: 8px;
        overflow: auto;
        margin-bottom: 1.5em;
      }

      .markdown-body pre code {
        background: none;
        padding: 0;
        font-size: 13px;
        color: #d4d4d4;
      }

      .markdown-body blockquote {
        border-left: 4px solid var(--accent);
        padding-left: 16px;
        color: var(--text-muted);
        margin-bottom: 1.5em;
        font-style: italic;
      }

      .markdown-body table {
        width: 100%;
        border-collapse: collapse;
        margin-bottom: 1.5em;
      }

      .markdown-body th,
      .markdown-body td {
        padding: 10px;
        border: 1px solid var(--border-color);
        text-align: left;
      }

      .markdown-body th {
        background-color: rgba(255, 255, 255, 0.05);
      }

      .markdown-body ul,
      .markdown-body ol {
        padding-left: 24px;
        margin-bottom: 1.5em;
      }

      .markdown-body img {
        max-width: 100%;
        border-radius: 8px;
        margin: 20px 0;
      }

      /* Home Dashboard */
      .home-hero {
        text-align: center;
        padding: 60px 0 40px;
        animation: fadeIn 0.5s ease;
      }

      .home-title {
        font-family:
          "SF Pro Display",
          -apple-system,
          sans-serif;
        font-size: 48px;
        font-weight: 700;
        margin-bottom: 16px;
        background: linear-gradient(
          135deg,
          var(--soft-white) 0%,
          var(--muted-gray) 100%
        );
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .home-subtitle {
        font-size: 20px;
        color: var(--text-muted);
        max-width: 600px;
        margin: 0 auto 40px;
      }

      .card-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 24px;
        margin-top: 40px;
      }

      .card {
        background: var(--bg-sidebar);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 24px;
        transition:
          transform 0.2s,
          border-color 0.2s;
        cursor: pointer;
        text-decoration: none;
        color: inherit;
      }

      .card:hover {
        transform: translateY(-4px);
        border-color: var(--accent);
      }

      .card h3 {
        color: var(--accent);
        margin-bottom: 12px;
        font-size: 18px;
      }

      .card p {
        font-size: 14px;
        color: var(--text-muted);
        line-height: 1.6;
      }

      .status-badge {
        display: inline-block;
        padding: 4px 8px;
        border-radius: 4px;
        font-size: 12px;
        font-weight: 600;
        background: rgba(74, 222, 128, 0.1);
        color: var(--success-glow);
        margin-bottom: 16px;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      /* Responsive */
      @media (max-width: 768px) {
        #sidebar {
          position: fixed;
          transform: translateX(-100%);
          width: 80%;
          max-width: 300px;
          box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        #sidebar.active {
          transform: translateX(0);
        }

        #mobile-header {
          display: flex;
        }

        #content-area {
          padding: 24px;
        }
      }
    </style>

        const contentDiv = document.getElementById("content-area");
        contentDiv.innerHTML =
          '<div style="color: var(--text-muted); padding: 20px;">Loading...</div>';

        try {
          const response = await fetch(path);
          if (!response.ok) throw new Error("File not found");
          const text = await response.text();

          // Configure Marked
          marked.setOptions({
            highlight: function (code, lang) {
              const language = highlight.getLanguage(lang) ? lang : "plaintext";
              return highlight.highlight(code, { language }).value;
            },
            langPrefix: "hljs language-",
          });

          contentDiv.innerHTML = `<div class="markdown-body">${marked.parse(text)}</div>`;

          // Highlight again for safety (sometimes marked sync highlight needs this)
          document.querySelectorAll("pre code").forEach((block) => {
            hljs.highlightElement(block);
          });

          // Update active state in sidebar
          const links = document.querySelectorAll(".sub-nav-item, .nav-item");
          links.forEach((link) => {
            if (link.getAttribute("href") === "#" + path) {
              updateActiveState(link);
              // Open parent accordion if needed
              const parent = link.closest(".accordion");
              if (parent) parent.classList.add("open");
            }
          });
        } catch (error) {
          contentDiv.innerHTML = `<div style="color: var(--rose-blush); padding: 20px;">Error loading content: ${error.message}</div>`;
        }
      }

      function updateActiveState(activeElement) {
        document
          .querySelectorAll(".nav-item, .sub-nav-item")
          .forEach((el) => el.classList.remove("active"));
        if (activeElement) activeElement.classList.add("active");
      }
    </script>
  </body>
</html>
