name: Protocol Zero

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: protocol-zero-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  scan:
    name: Protocol Zero
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Protocol Zero scan
        run: |
          chmod +x ./protocol-zero.sh
          ./protocol-zero.sh
